<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1419" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Alacaklılar — İddaa Günlük Hesap</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Alacaklılar</h1>
      <p class="card-desc header-desc">Borçlu kişileri ve tutarlarını takip edin</p>
      <p class="sync-status" id="sync-status">Yükleniyor…</p>
    </header>

    <main class="main">
      <section class="card">
        <h2>Yeni Alacaklı</h2>
        <form id="alacakli-form" class="alacakli-form">
          <label class="alacakli-field">
            <span>Alacaklı İsmi</span>
            <input type="text" id="alacakli-isim" required placeholder="Ad soyad veya müşteri adı" autocomplete="name" />
          </label>
          <label class="alacakli-field">
            <span>Miktar (₺)</span>
            <input type="text" id="alacakli-miktar" inputmode="decimal" required placeholder="0" />
          </label>
          <label class="alacakli-field alacakli-field--optional">
            <span>Tarih <em>(opsiyonel)</em></span>
            <input type="date" id="alacakli-tarih" />
          </label>
          <button type="submit" class="btn btn-primary" id="alacakli-ekle-btn">Ekle</button>
        </form>
      </section>

      <section class="card alacakli-summary-card">
        <div class="subtotal alacakli-summary">
          <span>Toplam Alacak</span>
          <strong id="alacakli-toplam">0,00 ₺</strong>
        </div>
        <p class="card-desc alacakli-count" id="alacakli-sayisi">0 kayıt</p>
      </section>

      <section class="card history-card">
        <h2>Alacaklı Listesi</h2>
        <div id="alacakli-liste" class="alacakli-list">
          <p class="empty-state">Henüz alacaklı kaydı yok.</p>
        </div>
      </section>
    </main>

    <nav class="app-nav" aria-label="Ana menü">
      <a class="app-nav__link" href="index.html">Günlük Hesap</a>
      <a class="app-nav__link app-nav__link--active" href="alacaklilar.html" aria-current="page">Alacaklılar</a>
    </nav>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="utils.js"></script>
  <script src="supabase-db.js"></script>
  <script src="alacaklilar.js"></script>
</body>
</html>
